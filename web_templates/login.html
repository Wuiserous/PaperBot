<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaperBot</title>
    <link rel="icon" href="{{ url_for('static', filename='icons/favicon-16.png') }}" sizes="16x16" type="image/png">
    <link rel="icon" href="{{ url_for('static', filename='icons/favicon-32.png') }}" sizes="32x32" type="image/png">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='site.webmanifest') }}">
    <meta name="theme-color" content="#161514">
    <style>
        :root {
            --bg: #f6f1ea;
            --card: rgba(255, 255, 255, 0.9);
            --text: #1f1a17;
            --muted: #70655d;
            --line: rgba(93, 67, 47, 0.14);
            --accent: #ae5731;
            --accent-dark: #7f3319;
            --soft: rgba(174, 87, 49, 0.08);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 16px;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--text);
            background: linear-gradient(180deg, #fbf7f2 0%, #efe4d7 100%);
        }
        .card {
            width: min(100%, 380px);
            padding: 22px;
            border-radius: 20px;
            border: 1px solid var(--line);
            background: var(--card);
            box-shadow: 0 18px 44px rgba(61, 43, 30, 0.10);
        }
        h1 { margin: 0 0 14px; font-size: 2rem; }
        .grid { display: grid; gap: 10px; }
        label { font-size: 0.92rem; }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--line);
            font: inherit;
            background: white;
        }
        button {
            width: 100%;
            padding: 12px 14px;
            border: 0;
            border-radius: 12px;
            font: inherit;
            color: white;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            cursor: pointer;
        }
        button:disabled {
            cursor: wait;
            opacity: 0.72;
        }
        .muted { color: var(--muted); margin: 0 0 14px; }
        .message {
            display: none;
            padding: 10px 11px;
            border-radius: 12px;
            background: var(--soft);
            color: var(--accent-dark);
        }
        .otp-step { display: none; }
    </style>
</head>
<body>
    <main class="card">
        <h1>PaperBot</h1>
        <p class="muted">Login with email OTP.</p>
        <div class="message" id="message"></div>

        <form class="grid" id="requestForm">
            <label for="name">Name</label>
            <input id="name" name="name" autocomplete="name" required>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required>
            <button type="submit" id="sendOtpButton">Send OTP</button>
        </form>

        <form class="grid otp-step" id="otpForm">
            <label for="otp">OTP</label>
            <input id="otp" name="otp" inputmode="numeric" maxlength="6" autocomplete="one-time-code" required>
            <button type="submit" id="verifyOtpButton">Continue</button>
        </form>
    </main>

    <script>
        const message = document.querySelector('#message');
        const requestForm = document.querySelector('#requestForm');
        const otpForm = document.querySelector('#otpForm');
        const sendOtpButton = document.querySelector('#sendOtpButton');
        const verifyOtpButton = document.querySelector('#verifyOtpButton');

        function showMessage(text) {
            message.textContent = text;
            message.style.display = 'block';
        }

        async function postJson(url, payload) {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            if (!response.ok || !data.ok) {
                throw new Error(data.error || 'Something went wrong.');
            }
            return data;
        }

        function setButtonLoading(button, isLoading, loadingText) {
            if (isLoading) {
                button.dataset.defaultText = button.textContent;
                button.textContent = loadingText;
                button.disabled = true;
                return;
            }

            button.textContent = button.dataset.defaultText || button.textContent;
            button.disabled = false;
        }

        requestForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            setButtonLoading(sendOtpButton, true, 'Sending...');
            try {
                await postJson('/auth/request-otp', {
                    name: requestForm.name.value,
                    email: requestForm.email.value
                });
                requestForm.style.display = 'none';
                otpForm.style.display = 'grid';
                showMessage('OTP sent.');
            } catch (error) {
                showMessage(error.message);
                setButtonLoading(sendOtpButton, false);
            }
        });

        otpForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            setButtonLoading(verifyOtpButton, true, 'Checking...');
            try {
                const data = await postJson('/auth/verify-otp', { otp: otpForm.otp.value });
                window.location.href = data.redirect;
            } catch (error) {
                showMessage(error.message);
                setButtonLoading(verifyOtpButton, false);
            }
        });
    </script>
</body>
</html>
