<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaperBot</title>
    <style>
        :root {
            --bg: #f6f1ea;
            --card: rgba(255, 255, 255, 0.88);
            --text: #1f1a17;
            --muted: #70655d;
            --line: rgba(93, 67, 47, 0.12);
            --accent: #ae5731;
            --accent-dark: #7f3319;
            --accent-soft: rgba(174, 87, 49, 0.08);
            --shadow: 0 18px 44px rgba(61, 43, 30, 0.10);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 16px;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--text);
            background:
                radial-gradient(circle at top right, rgba(174, 87, 49, 0.16), transparent 28%),
                linear-gradient(180deg, #fbf7f2 0%, #efe4d7 100%);
        }

        .card {
            width: min(100%, 360px);
            padding: 24px;
            border-radius: 24px;
            border: 1px solid var(--line);
            background: var(--card);
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        h1 {
            margin: 0 0 6px;
            font-size: 1.9rem;
        }

        p {
            margin: 0 0 16px;
            color: var(--muted);
        }

        .flash {
            margin-bottom: 14px;
            padding: 11px 12px;
            border-radius: 14px;
            border: 1px solid rgba(174, 87, 49, 0.18);
            background: var(--accent-soft);
            color: var(--accent-dark);
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 13px 14px;
            border-radius: 14px;
            border: 1px solid var(--line);
            font: inherit;
            background: white;
            margin-bottom: 14px;
        }

        button {
            width: 100%;
            padding: 13px 14px;
            border: 0;
            border-radius: 14px;
            font: inherit;
            color: white;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            cursor: pointer;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>PaperBot</h1>
        <p>Sign in</p>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="post" action="{{ url_for('web_login') }}">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
            <button type="submit">Continue</button>
        </form>
    </main>
</body>
</html>
