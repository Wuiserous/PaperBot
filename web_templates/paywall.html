<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaperBot</title>
    <link rel="icon" href="{{ url_for('static', filename='icons/favicon.svg') }}" type="image/svg+xml">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='site.webmanifest') }}">
    <meta name="theme-color" content="#161514">
    <style>
        :root {
            --card: rgba(255, 255, 255, 0.9);
            --text: #1f1a17;
            --muted: #70655d;
            --line: rgba(93, 67, 47, 0.14);
            --accent: #ae5731;
            --accent-dark: #7f3319;
            --soft: rgba(174, 87, 49, 0.08);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 16px;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--text);
            background: linear-gradient(180deg, #fbf7f2 0%, #efe4d7 100%);
        }
        .card {
            width: min(100%, 400px);
            padding: 22px;
            border-radius: 20px;
            border: 1px solid var(--line);
            background: var(--card);
            box-shadow: 0 18px 44px rgba(61, 43, 30, 0.10);
        }
        h1 { margin: 0 0 10px; font-size: 1.8rem; }
        p { color: var(--muted); }
        .actions { display: grid; gap: 10px; margin-top: 14px; }
        a, button {
            width: 100%;
            padding: 12px 14px;
            border: 0;
            border-radius: 12px;
            font: inherit;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
        }
        .primary {
            color: white;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
        }
        .secondary {
            color: var(--accent-dark);
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid var(--line);
        }
        .message {
            display: none;
            margin-top: 12px;
            padding: 10px 11px;
            border-radius: 12px;
            background: var(--soft);
            color: var(--accent-dark);
        }
        .message.visible { display: block; }
        button:disabled {
            cursor: not-allowed;
            opacity: 0.65;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Subscription required</h1>
        <p>30 days access for Rs. 999.</p>
        {% if payment_error %}
            <div class="message visible">{{ payment_error }}</div>
        {% endif %}
        <div class="actions">
            {% if payment_url %}
                <a class="primary" href="{{ payment_url }}">Pay Rs. 999</a>
            {% else %}
                <button class="primary" type="button" disabled>Payment unavailable</button>
            {% endif %}
            <button class="secondary" id="checkButton" type="button">Check Status</button>
            <a class="secondary" href="{{ url_for('web_logout') }}">Logout</a>
        </div>
        <div class="message" id="message"></div>
    </main>
    <script>
        const message = document.querySelector('#message');
        document.querySelector('#checkButton').addEventListener('click', async () => {
            const response = await fetch('/pay/check', { method: 'POST' });
            const data = await response.json();
            if (data.ok) {
                window.location.href = data.redirect;
                return;
            }
            message.textContent = data.error || 'Payment not active yet.';
            message.style.display = 'block';
        });
    </script>
</body>
</html>
